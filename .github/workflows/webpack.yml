name: "Build and Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # For Apple Silicon and Intel Macs
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04" # For Linux
            args: ""
          - platform: "windows-latest" # For Windows
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only needed on macOS
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            xvfb

      - name: install frontend dependencies
        run: npm install

      - name: setup virtual display (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # Start Xvfb with a log file to debug issues
          sudo Xvfb :99 -screen 0 1024x768x24 -ac -nolisten tcp > /tmp/xvfb.log 2>&1 &
          XVFB_PID=$!
          
          # Give Xvfb time to start
          sleep 2
          
          # Verify Xvfb is running
          if ! kill -0 $XVFB_PID 2>/dev/null; then
            echo "Xvfb failed to start"
            cat /tmp/xvfb.log
            exit 1
          fi
          
          # Set environment variables
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "XAUTHORITY=/tmp/.Xauthority" >> $GITHUB_ENV
          
          # Verify display is accessible
          DISPLAY=:99 xset q || true

      - uses: tauri-apps/tauri-action@v0
        if: matrix.platform != 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # This will be replaced by the version in package.json
          releaseName: "Chess Tournament Manager v__VERSION__"
          releaseBody: "Automated build of Chess Tournament Manager."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - uses: tauri-apps/tauri-action@v0
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPLAY: :99
          XAUTHORITY: /tmp/.Xauthority
          GDK_BACKEND: x11
          LIBGL_ALWAYS_INDIRECT: 1
        with:
          tagName: app-v__VERSION__ # This will be replaced by the version in package.json
          releaseName: "Chess Tournament Manager v__VERSION__"
          releaseBody: "Automated build of Chess Tournament Manager."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}