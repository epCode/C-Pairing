name: "Build and Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    env:
      # These two lines fix the "Could not create surfaceless EGL display" error 
      # by disabling hardware acceleration during the build process.
      WEBKIT_DISABLE_COMPOSITING_MODE: 1
      WEBKIT_FORCE_SANDBOX: 0

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev xvfb
          
          # Start the virtual display in the background
          Xvfb :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell Tauri to use the virtual display we just started
          DISPLAY: :99 
          # Prevent WebKit from looking for a hardware GPU
          WEBKIT_DISABLE_COMPOSITING_MODE: 1 
        with:
          tagName: v__VERSION__
          releaseName: "Chess Tournament Manager v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}